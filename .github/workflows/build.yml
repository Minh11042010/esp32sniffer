name: Build ESP32-C3 Firmware

on:
  push:
    branches: [ master, main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Firmware for ESP32-C3
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: 'v5.1'
          target: 'esp32c3'
          path: '.'
          # We add a command string to clear old files and explicitly assign the C3 target profile
          command: |
            rm -f sdkconfig
            idf.py set-target esp32c3
            idf.py build

      - name: Upload Compiled Binary Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32c3-sniffer-firmware
          path: |
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/esp32sniffer.bin
            build/flasher_args.json
